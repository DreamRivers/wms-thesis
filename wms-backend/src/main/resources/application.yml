server:
  port: 8080
  servlet:
    context-path: /

spring:
  profiles:
    active: dev
  application:
    name: wms-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.wms.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 28800          # 8 小时
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  is-read-cookie: false
  is-read-header: true
  jwt-secret-key: wms-graduation-secret-key-2026

# Druid 数据源
spring.datasource:
  type: com.alibaba.druid.pool.DruidDataSource
  driver-class-name: com.mysql.cj.jdbc.Driver
  druid:
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: false
    test-on-return: false
    pool-prepared-statements: true
    max-pool-prepared-statement-per-connection-size: 20
    filters: stat,wall
    stat-view-servlet:
      enabled: true
      url-pattern: /druid/*
      login-username: admin
      login-password: admin

# Redis
spring.redis:
  host: 127.0.0.1
  port: 6379
  database: 0
  timeout: 10000ms
  lettuce:
    pool:
      max-active: 200
      max-wleisure: 10
      max-idle: 10
      min-idle: 0

# 日志
logging:
  level:
    root: info
    com.wms: debug
    com.wms.modules.*.mapper: debug
  file:
    name: ./logs/wms-backend.log

# 自定义配置
wms:
  jwt:
    secret: wms-graduation-jwt-secret
  captcha:
    enabled: true
    expire: 300
  warning:
    low-stock-cron: "0 0 * * * ?"
    expire-days: 30

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-version: false
    enable-swagger-models: true
    swagger-model-name: 实体类列表
